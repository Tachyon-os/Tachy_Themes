<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <radialGradient id="glow1" cx="25%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#faa0a0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#f07878" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#fdd0d0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1080" height="1920" fill="#141414"/>

  <!-- Subtle noise texture via layered rects -->
  <rect width="1080" height="1920" fill="url(#glow1)"/>
  <rect width="1080" height="1920" fill="url(#glow2)"/>
  <rect width="1080" height="1920" fill="url(#glow3)"/>

  <!-- Large blurred pink orb bottom-left -->
  <ellipse cx="180" cy="1550" rx="380" ry="380" fill="#faa0a0" opacity="0.10" filter="url(#blur2)"/>

  <!-- Medium blurred pink orb top-right -->
  <ellipse cx="920" cy="320" rx="260" ry="260" fill="#f07878" opacity="0.08" filter="url(#blur2)"/>

  <!-- Tiny accent orb center -->
  <ellipse cx="540" cy="960" rx="120" ry="120" fill="#fdd0d0" opacity="0.04" filter="url(#blur1)"/>

  <!-- Subtle grid lines -->
  <g stroke="#faa0a0" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="192" x2="1080" y2="192"/>
    <line x1="0" y1="384" x2="1080" y2="384"/>
    <line x1="0" y1="576" x2="1080" y2="576"/>
    <line x1="0" y1="768" x2="1080" y2="768"/>
    <line x1="0" y1="960" x2="1080" y2="960"/>
    <line x1="0" y1="1152" x2="1080" y2="1152"/>
    <line x1="0" y1="1344" x2="1080" y2="1344"/>
    <line x1="0" y1="1536" x2="1080" y2="1536"/>
    <line x1="0" y1="1728" x2="1080" y2="1728"/>
    <line x1="108" y1="0" x2="108" y2="1920"/>
    <line x1="216" y1="0" x2="216" y2="1920"/>
    <line x1="324" y1="0" x2="324" y2="1920"/>
    <line x1="432" y1="0" x2="432" y2="1920"/>
    <line x1="540" y1="0" x2="540" y2="1920"/>
    <line x1="648" y1="0" x2="648" y2="1920"/>
    <line x1="756" y1="0" x2="756" y2="1920"/>
    <line x1="864" y1="0" x2="864" y2="1920"/>
    <line x1="972" y1="0" x2="972" y2="1920"/>
  </g>

  <!-- Diagonal accent line top-left -->
  <line x1="-100" y1="500" x2="600" y2="-100" stroke="#faa0a0" stroke-opacity="0.06" stroke-width="1.5"/>
  <!-- Diagonal accent line bottom-right -->
  <line x1="480" y1="2020" x2="1180" y2="1320" stroke="#faa0a0" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- Corner accents -->
  <rect x="0" y="0" width="60" height="3" fill="#faa0a0" opacity="0.25"/>
  <rect x="0" y="0" width="3" height="60" fill="#faa0a0" opacity="0.25"/>
  <rect x="1020" y="0" width="60" height="3" fill="#faa0a0" opacity="0.25"/>
  <rect x="1077" y="0" width="3" height="60" fill="#faa0a0" opacity="0.25"/>
  <rect x="0" y="1917" width="60" height="3" fill="#faa0a0" opacity="0.25"/>
  <rect x="0" y="1860" width="3" height="60" fill="#faa0a0" opacity="0.25"/>
  <rect x="1020" y="1917" width="60" height="3" fill="#faa0a0" opacity="0.25"/>
  <rect x="1077" y="1860" width="3" height="60" fill="#faa0a0" opacity="0.25"/>

  <!-- Small dot cluster bottom-left -->
  <circle cx="160" cy="1700" r="2" fill="#faa0a0" opacity="0.3"/>
  <circle cx="175" cy="1715" r="1.5" fill="#faa0a0" opacity="0.2"/>
  <circle cx="148" cy="1718" r="1" fill="#faa0a0" opacity="0.15"/>
  <circle cx="190" cy="1695" r="1" fill="#faa0a0" opacity="0.15"/>

  <!-- Small dot cluster top-right -->
  <circle cx="920" cy="200" r="2" fill="#faa0a0" opacity="0.3"/>
  <circle cx="935" cy="215" r="1.5" fill="#faa0a0" opacity="0.2"/>
  <circle cx="908" cy="218" r="1" fill="#faa0a0" opacity="0.15"/>
  <circle cx="950" cy="195" r="1" fill="#faa0a0" opacity="0.15"/>
</svg>
